name: Build & Push Docker Images

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      claude_version:
        description: 'Claude Code version to install (leave empty for latest)'
        required: false
        default: ''

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/agentdock

jobs:
  build:
    name: Build ${{ matrix.platform }} image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: arch
            dockerfile: docker/arch/Dockerfile
            base_image: archlinux
            base_version: latest
            tags_suffix: arch
            # archlinux only publishes amd64 images
            build_platforms: linux/amd64
          - platform: debian
            dockerfile: docker/debian/Dockerfile
            base_image: debian
            base_version: bookworm-slim
            tags_suffix: debian
            build_platforms: linux/amd64,linux/arm64
          - platform: ubuntu
            dockerfile: docker/ubuntu/Dockerfile
            base_image: ubuntu
            base_version: "24.04"
            tags_suffix: ubuntu
            build_platforms: linux/amd64,linux/arm64
          - platform: alpine
            dockerfile: docker/alpine/Dockerfile
            base_image: alpine
            base_version: "3.21"
            tags_suffix: alpine
            build_platforms: linux/amd64,linux/arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve Claude Code version
        id: claude
        env:
          INPUT_CLAUDE_VERSION: ${{ github.event.inputs.claude_version }}
        run: |
          if [ -n "$INPUT_CLAUDE_VERSION" ]; then
            echo "version=$INPUT_CLAUDE_VERSION" >> "$GITHUB_OUTPUT"
          else
            VERSION=$(npm view @anthropic-ai/claude-code version 2>/dev/null)
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          fi

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}-${{ matrix.tags_suffix }}
            type=semver,pattern={{major}}.{{minor}}-${{ matrix.tags_suffix }}
            type=raw,value=${{ matrix.tags_suffix }},enable=${{ github.ref_type == 'tag' }}
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' && matrix.platform == 'arch' }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            CLAUDE_VERSION=${{ steps.claude.outputs.version }}
            BASE_VERSION=${{ matrix.base_version }}
            BUILD_DATE=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.created'] }}
            VCS_REF=${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=${{ matrix.platform }}
          platforms: ${{ matrix.build_platforms }}
